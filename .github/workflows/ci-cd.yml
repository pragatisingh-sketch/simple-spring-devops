name: Simple Spring Boot → GCP Compute Engine

on:
  push:
    branches:
      - main

env:
  VM_USER: ipragatisingh30

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v3

      - name: ✅ Set up Java 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: ✅ Build JAR with Maven
        run: mvn clean package -DskipTests

      - name: ✅ Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_EXTERNAL_IP }} >> ~/.ssh/known_hosts

      - name: ✅ Copy JAR to VM
        run: |
          scp -i ~/.ssh/id_rsa \
            target/simple-spring-boot-1.0.0.jar \
            ${{ env.VM_USER }}@${{ secrets.VM_EXTERNAL_IP }}:/home/${{ env.VM_USER }}/app.jar

      - name: ✅ Deploy and Run App on VM
        run: |
          ssh -i ~/.ssh/id_rsa ${{ env.VM_USER }}@${{ secrets.VM_EXTERNAL_IP }} << 'EOF'
            export SDKMAN_DIR="/home/ipragatisingh30/.sdkman"
            source "/home/ipragatisingh30/.sdkman/bin/sdkman-init.sh"
            pkill -f 'java -jar' || true
            sleep 2
            nohup java -jar /home/ipragatisingh30/app.jar \
              --server.port=8080 \
              > /home/ipragatisingh30/app.log 2>&1 &
            sleep 3
            echo "✅ App started successfully!"
          EOF

      - name: ✅ App is Live!
        run: |
          echo "========================================"
          echo "🚀 Your App is LIVE at:"
          echo "http://${{ secrets.VM_EXTERNAL_IP }}:8080/api/hello"
          echo "http://${{ secrets.VM_EXTERNAL_IP }}:8080/api/health"
          echo "========================================"